<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">My Website</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/post">글목록</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">게시글 수정</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/post/update" method="post">
                            <!-- 수정을 위해 PK인 num을 hidden으로 전달 -->
                            <input type="hidden" name="num" value="{{ post.num }}">
                            
                            <div class="mb-3">
                                <label for="writer" class="form-label">작성자</label>
                                <input type="text" name="writer" id="writer" class="form-control" value="{{ post.writer }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="title" class="form-label">제목</label>
                                <input type="text" name="title" id="title" class="form-control" value="{{ post.title }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="content" class="form-label">내용</label>
                                <textarea name="content" id="content" rows="10" class="form-control" required>{{ post.content }}</textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <a href="/post" class="btn btn-secondary">취소</a>
                                <button type="submit" class="btn btn-primary px-4">수정 완료</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
