<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">My Website</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/post">글목록</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>게시글 목록</h3>
            <a href="/post/new" class="btn btn-primary">새글 작성</a>
        </div>
        
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="px-4">번호</th>
                            <th>작성자</th>
                            <th>제목</th>
                            <th>내용</th>
                            <th>작성일</th>
                            <th class="text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for post in posts %}
                        <tr>
                            <td class="px-4">{{ post.num }}</td>
                            <td>{{ post.writer }}</td>
                            <td><strong>{{ post.title }}</strong></td>
                            <td>{{ post.content }}</td>
                            <td>{{ post.created_at.strftime('%Y-%m-%d %H:%M') if post.created_at else '' }}</td>
                            <td class="text-center">
                                <form action="/post/delete" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');" style="display:inline;">
                                    <input type="hidden" name="num" value="{{ post.num }}">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                        {% if not posts %}
                        <tr>
                            <td colspan="6" class="text-center py-5 text-muted">등록된 게시글이 없습니다.</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
